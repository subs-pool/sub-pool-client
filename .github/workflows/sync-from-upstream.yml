name: sync-from-upstream

# Pull the canonical client source from a private upstream monorepo
# into this standalone mirror. Mirror-only files (meta/, the workflow
# files themselves, mirror README, examples/codex_hello.py,
# pyproject.toml, .gitignore) are NOT touched — only `sub_pool_client/`
# and `examples/hello.py` get refreshed.
#
# Opens a PR rather than committing directly so a human eyeballs the
# diff before it goes out.
#
# Setup required (one-time):
#   - Add two repo secrets (Settings → Secrets and variables → Actions):
#       UPSTREAM_REPO    "<owner>/<repo>" of the upstream monorepo
#       UPSTREAM_TOKEN   fine-grained PAT with Contents: Read scoped to
#                        that one repo (https://github.com/settings/tokens)

on:
  schedule:
    - cron: "0 4 * * 1"   # weekly Monday 04:00 UTC
  workflow_dispatch:       # also manually-triggerable from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror
        uses: actions/checkout@v4

      - name: Checkout upstream (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.UPSTREAM_REPO }}
          token: ${{ secrets.UPSTREAM_TOKEN }}
          path: upstream
          # Sparse-checkout only the bits we mirror — saves bandwidth
          # and surfaces the intent.
          sparse-checkout: |
            client/sub_pool_client
            examples/hello.py
          sparse-checkout-cone-mode: false

      - name: Apply sync
        run: |
          set -euo pipefail
          # SDK module. `_version.py` gets regenerated by hatch-vcs at
          # build time — never carry the upstream-baked one over.
          rm -rf sub_pool_client
          cp -R upstream/client/sub_pool_client sub_pool_client
          rm -f sub_pool_client/_version.py
          # Claude example. `codex_hello.py` is mirror-only — leave it.
          cp upstream/examples/hello.py examples/hello.py
          rm -rf upstream

      - name: Open PR if dirty
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no upstream changes — nothing to sync"
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="sync/$DATE"
          # Avoid colliding with an existing branch if the workflow ran
          # earlier today (e.g., on cron and again via workflow_dispatch).
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            BRANCH="sync/$(date -u +%Y-%m-%dT%H-%M)"
          fi

          git config user.name "sub-pool-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Sync from upstream $DATE

          Pulls latest \`sub_pool_client/\` + \`examples/hello.py\` from
          upstream main. \`meta/\`, \`examples/codex_hello.py\`,
          \`pyproject.toml\`, \`.github/\` and the mirror README are
          mirror-owned and untouched."
          git push origin "$BRANCH"

          gh pr create \
            --title "Sync from upstream $DATE" \
            --body "Automated sync of \`sub_pool_client/\` + \`examples/hello.py\` from upstream main.

          Merge to release the upstream changes; tag a \`v*\` afterwards to publish to PyPI."
