name: publish

# Tag-driven publish for sub-pool-client. The PyPI job is gated by the
# `pypi` GitHub environment (configure it to require a reviewer so the
# real publish doesn't go out without a click).
#
# Trusted Publishing — no long-lived tokens. One pending publisher
# needs to be registered (owner=subs-pool, repo=sub-pool-client,
# workflow=publish.yml, env=pypi, project=sub-pool-client).
#
# The companion `sub-pool` placeholder distribution (see meta/) is
# wired up in source but NOT in this workflow — register a pending
# publisher for it and add the build/publish jobs back when you want
# to claim the short name on PyPI.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from the nearest tag — needs
          # the full commit + tag graph, not a shallow clone.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sub-pool-client
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sub-pool-client/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
