name: publish

# Tag-driven publish for both `sub-pool-client` (real package) and
# `sub-pool` (placeholder pointing at the client). TestPyPI runs first
# unconditionally; the PyPI job is gated by the `pypi` GitHub
# environment, which the repo admin configures to require manual
# approval before either real publish goes out.
#
# Trusted Publishing is used for both packages on both indexes — no
# long-lived tokens. Owner / repo / workflow / environment must match
# the four "pending publishers" registered on PyPI + TestPyPI.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from the nearest tag — needs
          # the full commit + tag graph, not a shallow clone.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sub-pool-client
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: dist/

  build-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sub-pool placeholder
        working-directory: meta
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-meta
          path: meta/dist/

  testpypi-client:
    needs: build-client
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/sub-pool-client/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Re-running the workflow with the same tag (e.g., after a
          # cosmetic README fix that doesn't bump the version) should
          # not hard-fail on TestPyPI — skip the upload if the version
          # is already there.
          skip-existing: true

  testpypi-meta:
    needs: build-meta
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/sub-pool/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-meta
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # The placeholder has a static 0.0.1 — every release after
          # the first will try to re-upload 0.0.1, which already exists.
          # `skip-existing` makes the job a no-op in that case rather
          # than failing the whole publish.
          skip-existing: true

  pypi-client:
    needs: testpypi-client
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sub-pool-client/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  pypi-meta:
    needs: testpypi-meta
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sub-pool/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-meta
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
